[build]
  publish = "public"
  functions = "netlify/functions"

# [functions] bölməsini tamamilə silin (və ya şərhə alın)

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from = "/app/*"
  to = "/index.html"
  status = 200
